<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Météo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="weather-card">
        <h1>Météo sur 5 jours</h1>
        <div class="search-box">
            <input type="text" id="city-input" placeholder="Ex: Toulouse">
            <button id="search-btn">Chercher</button>
        </div>
        
        <!-- Zone de résultat -->
        <div id="weather-result" class="hidden">
            <h2 id="city-name">--</h2>
            
            <!-- C'est ici que le JavaScript va injecter les jours -->
            <div id="forecast-container" class="forecast-grid"></div>
            <div id="hourly-result" class="hidden">
                <h3 id="hourly-title">Détails de la journée</h3>
                <div id="hourly-container" class="hourly-grid"></div>
            </div>
        </div>

        <!-- Message d'erreur -->
        <p id="error-message" class="hidden error">Ville introuvable. Réessaie.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
