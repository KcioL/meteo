<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Météo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="weather-card">
        <h1>Météo</h1>
        <div class="search-box">
            <input type="text" id="city-input" placeholder="Ex: Pau">
            <button id="search-btn">Chercher</button>
        </div>
        
        <div id="weather-result" class="hidden">
            <h2 id="city-name">--</h2>
            <div class="temp-container">
                <span id="temperature">--</span><span class="unit">°C</span>
            </div>
            <p id="description" class="desc">--</p>
            <img id="weather-icon" src="" alt="Icône météo">
        </div>

        <p id="error-message" class="hidden error">Ville introuvable. Réessaie.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
